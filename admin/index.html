<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Inloggen</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="admin-login-page">
  <main class="login-card">
    <h1>Portfolio beheer</h1>
    <p class="login-hint">Log in om content en design aan te passen.</p>

    <form id="login-form" action="#" method="post" novalidate>
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required autocomplete="email" />

      <label for="password">Wachtwoord</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />

      <button type="submit" class="btn btn-primary" id="login-btn">Inloggen</button>
    </form>

    <p id="login-error" class="message message-error" role="alert" hidden></p>
    <a href="/" class="back-link">← Terug naar website</a>
  </main>

  <script src="/lib/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/lib/supabase.js"></script>
  <script src="/admin/admin-login.js"></script>
</body>
</html>
